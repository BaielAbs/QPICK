{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — QPICK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfd;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="text-[#1d1d1f] min-h-screen flex flex-col justify-between selection:bg-[#dfa84b] selection:text-white">

    <header class="w-full max-w-[1140px] mx-auto px-4 sm:px-6 py-6">
        <a href="{% url 'tehno_start' %}" class="text-3xl font-extrabold tracking-tighter text-black hover:opacity-70 transition-opacity">
            QPICK<span class="text-[#dfa84b]">.</span>
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 sm:px-6 my-8 animate-fade-up">
        <div class="bg-white rounded-[40px] p-8 sm:p-10 shadow-[0_8px_40px_rgba(0,0,0,0.03)] border border-gray-100 max-w-md w-full relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#dfa84b]/5 rounded-full blur-3xl"></div>

            <h1 class="text-2xl font-extrabold text-black tracking-tight mb-6">Создать аккаунт</h1>

            <form id="registerForm" class="space-y-4 relative z-10">
                <div>
                    <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Имя</label>
                    <input type="text" id="regName" required placeholder="Иван"
                           class="w-full bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Имя пользователя (Username)</label>
                    <input type="text" id="regUsername" required placeholder="ivan_cool"
                           class="w-full bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Email</label>
                    <input type="email" id="regEmail" required placeholder="example@mail.com"
                           class="w-full bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all">
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-1">
                        <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Возраст</label>
                        <input type="number" id="regAge" required placeholder="18" min="16" max="100"
                               class="w-full bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Дата рождения</label>
                        <div class="flex gap-2">
                            <select id="regDay" required class="w-2/5 bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all cursor-pointer appearance-none">
                                <option value="" disabled selected>День</option>
                                <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option>
                            </select>
                            <select id="regMonth" required class="w-3/5 bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all cursor-pointer appearance-none">
                                <option value="" disabled selected>Месяц</option>
                                <option value="января">Январь</option>
                                <option value="февраля">Февраль</option>
                                <option value="марта">Март</option>
                                <option value="апреля">Апрель</option>
                                <option value="мая">Май</option>
                                <option value="июня">Июнь</option>
                                <option value="июля">Июль</option>
                                <option value="августа">Август</option>
                                <option value="сентября">Сентябрь</option>
                                <option value="октября">Октябрь</option>
                                <option value="ноября">Ноябрь</option>
                                <option value="декабря">Декабрь</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Пароль</label>
                    <input type="password" id="regPassword" required placeholder="••••••••"
                           class="w-full bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all">
                </div>

                <div id="errorMessage" class="text-xs font-semibold text-red-500 bg-red-50 border border-red-100 p-3 rounded-2xl hidden animate-fade-up"></div>

                <button type="submit" class="w-full bg-black hover:bg-[#dfa84b] text-white font-bold text-sm py-4 rounded-full shadow-[0_10px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_10px_25px_rgba(223,168,75,0.3)] transition-all duration-300 active:scale-[0.97] mt-4 cursor-pointer">
                    Зарегистрироваться
                </button>
            </form>

            <p class="text-xs font-semibold text-center text-gray-400 mt-8">
                Уже есть аккаунт? <a href="{% url 'tehno_login' %}" class="text-[#dfa84b] font-bold hover:opacity-80 transition-opacity ml-0.5">Войти</a>
            </p>
        </div>
    </main>

    <footer class="w-full text-center py-6 text-xs font-semibold text-gray-400">
        © 2026 QPICK. Все права защищены.
    </footer>

    <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById('errorMessage');
        errDiv.classList.add('hidden');

        const name = document.getElementById('regName').value;
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const age = document.getElementById('regAge').value;
        const day = document.getElementById('regDay').value;
        const month = document.getElementById('regMonth').value;
        const password = document.getElementById('regPassword').value;

        const date = `${day} ${month}`;

        try {
            const checkResponse = await fetch('https://6a2fe782a7f8866418d53f42.mockapi.io/Register');
            if (!checkResponse.ok) throw new Error('Ошибка сервера');
            const users = await checkResponse.json();

            const isDuplicate = users.some(u => u.Username === username || u.Email === email);

            if (isDuplicate) {
                errDiv.innerText = 'Пользователь с таким Username или Email уже существует!';
                errDiv.classList.remove('hidden');
                return;
            }

            const response = await fetch('https://6a2fe782a7f8866418d53f42.mockapi.io/Register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Name: name,
                    Username: username,
                    Email: email,
                    Age: Number(age),
                    Date: date,
                    Password: password
                })
            });

            if (response.ok) {
                window.location.href = "{% url 'tehno_login' %}";
            } else {
                errDiv.innerText = 'Ошибка при сохранении данных.';
                errDiv.classList.remove('hidden');
            }
        } catch (error) {
            errDiv.innerText = 'Ошибка сети или сервера. Попробуйте позже.';
            errDiv.classList.remove('hidden');
        }
    });
    </script>
</body>
</html>
