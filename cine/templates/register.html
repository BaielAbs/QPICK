<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — QPICK</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#eaeaea] font-sans text-[#1c1c1c] min-h-screen flex flex-col justify-between">

    <header class="max-w-[1110px] w-full mx-auto px-4 py-4">
        <a href="{% url 'tehno_start' %}" class="text-2xl font-bold tracking-wide text-neutral-900">QPICK</a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 my-6">
        <div class="bg-white rounded-3xl p-8 shadow-sm max-w-md w-full">
            <h1 class="text-xl font-bold text-neutral-800 mb-6">Создать аккаунт</h1>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Имя</label>
                    <input type="text" id="regName" required placeholder="Иван"
                           class="w-full bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Имя пользователя (Username)</label>
                    <input type="text" id="regUsername" required placeholder="ivan_cool"
                           class="w-full bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Email</label>
                    <input type="email" id="regEmail" required placeholder="example@mail.com"
                           class="w-full bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Возраст</label>
                    <input type="number" id="regAge" required placeholder="18" min="16" max="100"
                           class="w-full bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">День и месяц рождения</label>
                    <div class="flex gap-2">
                        <select id="regDay" required class="w-1/3 bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition cursor-pointer">
                            <option value="" disabled selected>День</option>
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option>
                        </select>
                        <select id="regMonth" required class="w-2/3 bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition cursor-pointer">
                            <option value="" disabled selected>Месяц</option>
                            <option value="января">Январь</option>
                            <option value="февраля">Февраль</option>
                            <option value="марта">Март</option>
                            <option value="апреля">Апрель</option>
                            <option value="мая">Май</option>
                            <option value="июня">Июнь</option>
                            <option value="июля">Июль</option>
                            <option value="августа">Август</option>
                            <option value="сентября">Сентябрь</option>
                            <option value="октября">Октябрь</option>
                            <option value="ноября">Ноябрь</option>
                            <option value="декабря">Декабрь</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Пароль</label>
                    <input type="password" id="regPassword" required placeholder="••••••••"
                           class="w-full bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition">
                </div>

                <div id="errorMessage" class="text-xs text-red-500 hidden"></div>

                <button type="submit" class="w-full bg-neutral-900 hover:bg-neutral-800 text-white font-semibold text-sm py-4 rounded-2xl shadow-md transition active:scale-98 mt-2 cursor-pointer">
                    Зарегистрироваться
                </button>
            </form>

            <p class="text-xs text-center text-neutral-400 mt-6">
                Уже есть аккаунт? <a href="{% url 'tehno_login' %}" class="text-[#dfa84b] font-semibold hover:underline">Войти</a>
            </p>
        </div>
    </main>

    <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById('errorMessage');
        errDiv.classList.add('hidden');

        const name = document.getElementById('regName').value;
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const age = document.getElementById('regAge').value;
        const day = document.getElementById('regDay').value;
        const month = document.getElementById('regMonth').value;
        const password = document.getElementById('regPassword').value;

        const date = `${day} ${month}`;

        try {
            const checkResponse = await fetch('https://6a2fe782a7f8866418d53f42.mockapi.io/Register');
            if (!checkResponse.ok) throw new Error('Ошибка сервера');
            const users = await checkResponse.json();

            const isDuplicate = users.some(u => u.Username === username || u.Email === email);

            if (isDuplicate) {
                errDiv.innerText = 'Пользователь с таким Username или Email уже существует!';
                errDiv.classList.remove('hidden');
                return;
            }

            const response = await fetch('https://6a2fe782a7f8866418d53f42.mockapi.io/Register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Name: name,
                    Username: username,
                    Email: email,
                    Age: Number(age),
                    Date: date,
                    Password: password
                })
            });

            if (response.ok) {
                window.location.href = "{% url 'tehno_login' %}";
            } else {
                errDiv.innerText = 'Ошибка при сохранении данных.';
                errDiv.classList.remove('hidden');
            }
        } catch (error) {
            errDiv.innerText = 'Ошибка сети или сервера. Попробуйте позже.';
            errDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
