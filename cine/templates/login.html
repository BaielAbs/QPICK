<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — QPICK</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#eaeaea] font-sans text-[#1c1c1c] min-h-screen flex flex-col justify-between">

    <header class="max-w-[1110px] w-full mx-auto px-4 py-4">
        <a href="{% url 'tehno_start' %}" class="text-2xl font-bold tracking-wide text-neutral-900">QPICK</a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="bg-white rounded-3xl p-8 shadow-sm max-w-md w-full">
            <h1 class="text-xl font-bold text-neutral-800 mb-6">Вход в аккаунт</h1>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Имя пользователя (Username)</label>
                    <input type="text" id="loginUsername" required placeholder="ivan_cool"
                           class="w-full bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Пароль</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••"
                           class="w-full bg-neutral-100 text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-[#dfa84b] focus:bg-white transition">
                </div>

                <div id="loginErrorMessage" class="text-xs text-red-500 hidden"></div>

                <button type="submit" class="w-full bg-neutral-900 hover:bg-neutral-800 text-white font-semibold text-sm py-4 rounded-2xl shadow-md transition active:scale-98 mt-2 cursor-pointer">
                    Войти
                </button>
            </form>

            <p class="text-xs text-center text-neutral-400 mt-6">
                Ещё нет аккаунта? <a href="{% url 'tehno_register' %}" class="text-[#dfa84b] font-semibold hover:underline">Зарегистрироваться</a>
            </p>
        </div>
    </main>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById('loginErrorMessage');
        errDiv.classList.add('hidden');

        const usernameInput = document.getElementById('loginUsername').value;
        const passwordInput = document.getElementById('loginPassword').value;

        try {
            const response = await fetch('https://6a2fe782a7f8866418d53f42.mockapi.io/Register');
            if (!response.ok) throw new Error();

            const users = await response.json();
            const user = users.find(u => u.Username === usernameInput && u.Password === passwordInput);

            if (user) {
                // ===== ВАЖНО: Сохраняем пользователя в localStorage =====
                localStorage.setItem('currentUser', JSON.stringify(user));

                window.location.href = "{% url 'index' %}";
            } else {
                errDiv.innerText = 'Неверное имя пользователя или пароль.';
                errDiv.classList.remove('hidden');
            }
        } catch (error) {
            errDiv.innerText = 'Ошибка проверки данных.';
            errDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
