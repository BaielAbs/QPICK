{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — QPICK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfd;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="text-[#1d1d1f] min-h-screen flex flex-col justify-between selection:bg-[#dfa84b] selection:text-white">

    <header class="w-full max-w-[1140px] mx-auto px-4 sm:px-6 py-6">
        <a href="{% url 'tehno_start' %}" class="text-3xl font-extrabold tracking-tighter text-black hover:opacity-70 transition-opacity">
            QPICK<span class="text-[#dfa84b]">.</span>
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 sm:px-6 my-8 animate-fade-up">
        <div class="bg-white rounded-[40px] p-8 sm:p-10 shadow-[0_8px_40px_rgba(0,0,0,0.03)] border border-gray-100 max-w-md w-full relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#dfa84b]/5 rounded-full blur-3xl"></div>

            <h1 class="text-2xl font-extrabold text-black tracking-tight mb-6">Вход в аккаунт</h1>

            <form id="loginForm" class="space-y-4 relative z-10">
                <div>
                    <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Имя пользователя (Username)</label>
                    <input type="text" id="loginUsername" required placeholder="ivan_cool"
                           class="w-full bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all">
                </div>
                <div>
                    <label class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Пароль</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••"
                           class="w-full bg-gray-50 border border-gray-100 text-sm font-medium py-3.5 px-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#dfa84b]/20 focus:border-[#dfa84b] focus:bg-white transition-all">
                </div>

                <div id="loginErrorMessage" class="text-xs font-semibold text-red-500 bg-red-50 border border-red-100 p-3 rounded-2xl hidden animate-fade-up"></div>

                <button type="submit" class="w-full bg-black hover:bg-[#dfa84b] text-white font-bold text-sm py-4 rounded-full shadow-[0_10px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_10px_25px_rgba(223,168,75,0.3)] transition-all duration-300 active:scale-[0.97] mt-4 cursor-pointer">
                    Войти
                </button>
            </form>

            <p class="text-xs font-semibold text-center text-gray-400 mt-8">
                Ещё нет аккаунта? <a href="{% url 'tehno_register' %}" class="text-[#dfa84b] font-bold hover:opacity-80 transition-opacity ml-0.5">Зарегистрироваться</a>
            </p>
        </div>
    </main>

    <footer class="w-full text-center py-6 text-xs font-semibold text-gray-400">
        © 2026 QPICK. Все права защищены.
    </footer>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById('loginErrorMessage');
        errDiv.classList.add('hidden');

        const usernameInput = document.getElementById('loginUsername').value;
        const passwordInput = document.getElementById('loginPassword').value;

        try {
            const response = await fetch('https://6a2fe782a7f8866418d53f42.mockapi.io/Register');
            if (!response.ok) throw new Error();

            const users = await response.json();
            const user = users.find(u => u.Username === usernameInput && u.Password === passwordInput);

            if (user) {
                // ===== ВАЖНО: Сохраняем пользователя в localStorage =====
                localStorage.setItem('currentUser', JSON.stringify(user));

                window.location.href = "{% url 'index' %}";
            } else {
                errDiv.innerText = 'Неверное имя пользователя или пароль.';
                errDiv.classList.remove('hidden');
            }
        } catch (error) {
            errDiv.innerText = 'Ошибка проверки данных.';
            errDiv.classList.remove('hidden');
        }
    });
    </script>
</body>
</html>
