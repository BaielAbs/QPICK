{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль — QPICK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfd;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="text-[#1d1d1f] min-h-screen flex flex-col justify-between selection:bg-[#dfa84b] selection:text-white">

    <header class="w-full sticky top-0 z-50 bg-white/50 backdrop-blur-2xl border-b border-gray-200/50">
        <div class="max-w-[1140px] mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <a href="{% url 'index' %}" class="text-3xl font-extrabold tracking-tighter text-black hover:opacity-70 transition-opacity">
                QPICK<span class="text-[#dfa84b]">.</span>
            </a>
            <a href="{% url 'index' %}" class="text-sm font-semibold text-gray-500 hover:text-black transition-colors flex items-center gap-2 group">
                <svg class="w-4 h-4 transform group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                В каталог
            </a>
        </div>
    </header>

    <main class="max-w-[1140px] w-full mx-auto px-4 sm:px-6 flex-grow flex items-center justify-center my-10 animate-fade-up">

        <div class="bg-white rounded-[40px] p-8 sm:p-12 shadow-[0_8px_40px_rgba(0,0,0,0.03)] border border-gray-100 max-w-xl w-full relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-[#dfa84b]/5 rounded-full blur-3xl"></div>

            <div class="flex items-center gap-5 mb-8 border-b border-gray-100 pb-6">
                <div class="w-16 h-16 bg-[#dfa84b]/10 text-[#dfa84b] border border-[#dfa84b]/20 rounded-2xl flex items-center justify-center text-2xl font-black shadow-sm shrink-0" id="avatarLetter">
                    U
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-black tracking-tight" id="profName">Загрузка...</h1>
                    <p class="text-sm font-semibold text-gray-400 mt-0.5">@<span id="profUsername">username</span></p>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
                <div>
                    <span class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Email адрес</span>
                    <p class="text-base font-semibold text-gray-900 break-all" id="profEmail">loading@mail.com</p>
                </div>
                <div>
                    <span class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Возраст</span>
                    <p class="text-base font-semibold text-gray-900"><span id="profAge">...</span> лет</p>
                </div>
                <div>
                    <span class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">День рождения</span>
                    <p class="text-base font-semibold text-gray-900" id="profDate">...</p>
                </div>
                <div>
                    <span class="block text-[11px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Статус аккаунта</span>
                    <p class="text-xs font-bold text-green-600 bg-green-50 border border-green-100 inline-block px-3 py-1.5 rounded-full mt-1">Активен</p>
                </div>
            </div>

            <div class="pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button onclick="logout()" class="flex-1 bg-gray-50 hover:bg-gray-100 border border-gray-100 text-black font-bold text-sm py-4 rounded-full transition-all duration-300 text-center cursor-pointer active:scale-[0.97]">
                    Выйти из аккаунта
                </button>

                <button onclick="deleteProfile()" class="flex-1 border border-gray-200 text-gray-400 hover:text-red-600 hover:border-red-200 hover:bg-red-50 font-bold text-sm py-4 rounded-full transition-all duration-300 text-center cursor-pointer active:scale-[0.97]">
                    Удалить профиль
                </button>
            </div>

            <div id="actionError" class="text-xs font-semibold text-red-500 bg-red-50 border border-red-100 p-3 rounded-2xl mt-4 text-center hidden animate-fade-up"></div>
        </div>

    </main>

    <footer class="bg-white border-t border-gray-100 py-6 text-xs font-semibold text-gray-400 rounded-t-[32px] shadow-[0_-4px_20px_rgba(0,0,0,0.01)]">
        <div class="max-w-[1140px] w-full mx-auto px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <span>© 2026 QPICK. Все права защищены.</span>
            <div class="flex items-center gap-1 bg-gray-50 p-1 rounded-full border border-gray-100">
                <div class="flex items-center px-2 text-[11px] font-bold gap-3">
                    <button class="text-black bg-white px-3 py-1.5 rounded-full shadow-sm">Кр</button>
                    <button class="text-gray-400 hover:text-black transition-colors">Рус</button>
                    <button class="text-gray-400 hover:text-black transition-colors">Eng</button>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!currentUser) {
            window.location.href = "{% url 'tehno_start' %}";
        } else {
            document.getElementById('profName').innerText = currentUser.Name;
            document.getElementById('profUsername').innerText = currentUser.Username;
            document.getElementById('profEmail').innerText = currentUser.Email;

            document.getElementById('profAge').innerText = currentUser.Age || '-';
            document.getElementById('profDate').innerText = currentUser.Date || '-';

            document.getElementById('avatarLetter').innerText = currentUser.Name.charAt(0).toUpperCase();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "{% url 'tehno_start' %}";
        }

        async function deleteProfile() {
            if (!confirm('Вы уверены, что хотите навсегда удалить свой профиль? Это действие нельзя отменить.')) {
                return;
            }

            const errDiv = document.getElementById('actionError');
            errDiv.classList.add('hidden');

            try {
                const response = await fetch(`https://6a2fe782a7f8866418d53f42.mockapi.io/Register/${currentUser.id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    localStorage.removeItem('currentUser');
                    alert('Ваш аккаунт успешно удален.');
                    window.location.href = "{% url 'tehno_start' %}";
                } else {
                    errDiv.innerText = 'Не удалось удалить профиль с сервера. Возможно, он уже удален.';
                    errDiv.classList.remove('hidden');
                }
            } catch (error) {
                errDiv.innerText = 'Ошибка сети. Не удалось связаться с сервером.';
                errDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
