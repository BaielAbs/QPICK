{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль — QPICK</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#eaeaea] font-sans text-[#1c1c1c] min-h-screen flex flex-col justify-between">

    <header class="max-w-[1110px] w-full mx-auto px-4 py-4 flex items-center justify-between sticky top-0 bg-[#eaeaea]/90 backdrop-blur-md z-50">
        <a href="{% url 'index' %}" class="text-2xl font-bold tracking-wide text-neutral-900">QPICK</a>
        <a href="{% url 'index' %}" class="text-sm font-semibold text-neutral-600 hover:text-neutral-900 transition">← В каталог</a>
    </header>

    <main class="max-w-[1110px] w-full mx-auto px-4 flex-grow flex items-center justify-center my-6">

        <div class="bg-white rounded-3xl p-8 sm:p-12 shadow-sm max-w-xl w-full">
            <div class="flex items-center gap-4 mb-8 border-b border-neutral-100 pb-6">
                <div class="w-16 h-16 bg-[#dfa84b]/20 text-[#dfa84b] rounded-full flex items-center justify-center text-2xl font-bold" id="avatarLetter">
                    U
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-neutral-800" id="profName">Загрузка...</h1>
                    <p class="text-sm text-neutral-400">@<span id="profUsername">username</span></p>
                </div>
            </div>

            <div class="space-y-4 mb-8">
                <div>
                    <span class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Email адрес</span>
                    <p class="text-base font-medium text-neutral-800" id="profEmail">loading@mail.com</p>
                </div>
                <div>
                    <span class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Возраст</span>
                    <p class="text-base font-medium text-neutral-800"><span id="profAge">...</span> лет</p>
                </div>
                <div>
                    <span class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Месяц и день рождения</span>
                    <p class="text-base font-medium text-neutral-800" id="profDate">...</p>
                </div>
                <div>
                    <span class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Статус аккаунта</span>
                    <p class="text-sm font-semibold text-green-600 bg-green-50 inline-block px-3 py-1 rounded-full mt-1">Активен</p>
                </div>
            </div>

            <div class="pt-4 border-t border-neutral-100 flex flex-col sm:flex-row gap-4">
                <button onclick="logout()" class="flex-1 bg-neutral-100 hover:bg-neutral-200 text-neutral-800 font-semibold text-sm py-3.5 rounded-xl transition text-center cursor-pointer active:scale-98">
                Выйти из аккаунта
                </button>

                <button onclick="deleteProfile()" class="flex-1 border border-neutral-300 text-neutral-500 hover:text-red-600 hover:border-red-200 hover:bg-red-50/50 font-semibold text-sm py-3.5 rounded-xl transition text-center cursor-pointer active:scale-98">
                Удалить профиль
                </button>
            </div>

            <div id="actionError" class="text-xs text-red-500 mt-4 text-center hidden"></div>
        </div>

    </main>

    <footer class="bg-white rounded-t-3xl shadow-inner pt-6 pb-6 mt-12 text-center text-xs text-neutral-400">
        <div class="max-w-[1110px] w-full mx-auto px-4 flex justify-between items-center">
            <span>© 2026 QPICK</span>
            <div class="flex gap-2">
                <span class="text-neutral-900 font-bold">Кр</span>
                <span class="text-neutral-400">Рус</span>
                <span class="text-neutral-400">Eng</span>
            </div>
        </div>
    </footer>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!currentUser) {
            window.location.href = "{% url 'tehno_start' %}";
        } else {
            document.getElementById('profName').innerText = currentUser.Name;
            document.getElementById('profUsername').innerText = currentUser.Username;
            document.getElementById('profEmail').innerText = currentUser.Email;

            document.getElementById('profAge').innerText = currentUser.Age || '-';
            document.getElementById('profDate').innerText = currentUser.Date || '-';

            document.getElementById('avatarLetter').innerText = currentUser.Name.charAt(0).toUpperCase();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "{% url 'tehno_start' %}";
        }

        async function deleteProfile() {
            if (!confirm('Вы уверены, что хотите навсегда удалить свой профиль? Это действие нельзя отменить.')) {
                return;
            }

            const errDiv = document.getElementById('actionError');
            errDiv.classList.add('hidden');

            try {
                const response = await fetch(`https://6a2fe782a7f8866418d53f42.mockapi.io/Register/${currentUser.id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    localStorage.removeItem('currentUser');
                    alert('Ваш аккаунт успешно удален.');
                    window.location.href = "{% url 'tehno_start' %}";
                } else {
                    errDiv.innerText = 'Не удалось удалить профиль с сервера. Возможно, он уже удален.';
                    errDiv.classList.remove('hidden');
                }
            } catch (error) {
                errDiv.innerText = 'Ошибка сети. Не удалось связаться с сервером.';
                errDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
