<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать — QPICK</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#eaeaea] font-sans text-[#1c1c1c] min-h-screen flex flex-col justify-between">

    <header class="max-w-[1110px] w-full mx-auto px-4 py-4">
        <span class="text-2xl font-bold tracking-wide text-neutral-900">QPICK</span>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="bg-white rounded-3xl p-8 sm:p-12 shadow-sm text-center max-w-md w-full">
            <h1 class="text-2xl font-bold text-neutral-800 mb-2">Добро пожаловать</h1>
            <p class="text-sm text-neutral-400 mb-8">Войдите в свой аккаунт или зарегистрируйтесь, чтобы продолжить покупки</p>

            <div class="space-y-4">
                <a href="{% url 'tehno_login' %}" class="w-full bg-neutral-900 hover:bg-neutral-800 text-white font-semibold text-sm py-4 rounded-2xl shadow-md transition text-center block active:scale-98">
                    Войти
                </a>
                <a href="{% url 'tehno_register' %}" class="w-full bg-neutral-100 hover:bg-neutral-200 text-neutral-800 font-semibold text-sm py-4 rounded-2xl transition text-center block active:scale-98">
                    Регистрация
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-white rounded-t-3xl pt-6 pb-6 text-center text-xs text-neutral-400">
        <div class="max-w-[1110px] w-full mx-auto px-4 flex justify-between items-center">
            <span>© 2026 QPICK</span>
            <div class="flex gap-2">
                <span class="text-neutral-900 font-bold">Кр</span>
                <span class="text-neutral-400">Рус</span>
                <span class="text-neutral-400">Eng</span>
            </div>
        </div>
    </footer>

</body>
</html>
