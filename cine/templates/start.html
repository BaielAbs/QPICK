{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать — QPICK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfd;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="text-[#1d1d1f] min-h-screen flex flex-col justify-between selection:bg-[#dfa84b] selection:text-white">

    <header class="w-full max-w-[1140px] mx-auto px-4 sm:px-6 py-6">
        <span class="text-3xl font-extrabold tracking-tighter text-black">
            QPICK<span class="text-[#dfa84b]">.</span>
        </span>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 sm:px-6 my-8 animate-fade-up">
        <div class="bg-white rounded-[40px] p-8 sm:p-12 shadow-[0_8px_40px_rgba(0,0,0,0.03)] border border-gray-100/80 text-center max-w-md w-full relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-[#dfa84b]/5 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-black/5 rounded-full blur-3xl"></div>

            <div class="w-16 h-16 bg-[#dfa84b]/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-[#dfa84b]/20 text-[#dfa84b]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
            </div>

            <h1 class="text-3xl font-extrabold text-black tracking-tight mb-3">Добро пожаловать</h1>
            <p class="text-sm font-medium text-gray-400 mb-10 px-2 leading-relaxed">Войдите в свой личный аккаунт или зарегистрируйтесь, чтобы продолжить покупки</p>

            <div class="space-y-4 relative z-10">
                <a href="{% url 'tehno_login' %}" class="w-full bg-black hover:bg-[#dfa84b] text-white font-bold text-sm py-4 rounded-full shadow-[0_10px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_10px_25px_rgba(223,168,75,0.3)] transition-all duration-300 text-center block active:scale-[0.97]">
                    Войти в аккаунт
                </a>
                <a href="{% url 'tehno_register' %}" class="w-full bg-gray-50 hover:bg-gray-100 border border-gray-100 text-black font-bold text-sm py-4 rounded-full transition-all duration-300 text-center block active:scale-[0.97]">
                    Создать аккаунт
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-6 text-xs font-semibold text-gray-400 rounded-t-[32px] shadow-[0_-4px_20px_rgba(0,0,0,0.01)]">
        <div class="max-w-[1140px] w-full mx-auto px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <span>© 2026 QPICK. Все права защищены.</span>
            <div class="flex items-center gap-1 bg-gray-50 p-1 rounded-full border border-gray-100">
                <div class="flex items-center px-2 text-[11px] font-bold gap-3">
                    <button class="text-black bg-white px-3 py-1.5 rounded-full shadow-sm">Кр</button>
                    <button class="text-gray-400 hover:text-black transition-colors">Рус</button>
                    <button class="text-gray-400 hover:text-black transition-colors">Eng</button>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
